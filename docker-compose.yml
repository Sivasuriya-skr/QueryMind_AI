services:
  postgres:
    image: postgres:16-alpine
    container_name: querymind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: querymind-backend
    restart: unless-stopped
    environment:
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      DATASOURCE_USERNAME: postgres
      DATASOURCE_PASSWORD: postgres
      JWT_SECRET: dev-jwt-secret-not-for-production
      CORS_ALLOWED_ORIGINS: http://localhost:80,http://localhost
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_URL: https://api.groq.com/openai/v1
      OPENAI_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: querymind-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
