services:
  backend:
    build: ./backend
    container_name: querymind-backend
    restart: unless-stopped
    environment:
      MYSQL_URL: jdbc:mysql://host.docker.internal:3306/querymind_app?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: Root@321
      JWT_SECRET: change-this-to-a-secure-secret-in-production
      CORS_ALLOWED_ORIGINS: http://localhost:80
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: querymind-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
