server:
  port: 8080

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/querymind_app?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:Root@321}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-not-for-production}
  expiration: ${JWT_EXPIRATION:86400000}

encryption:
  key: ${ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  rate-limit:
    max-requests: ${RATE_LIMIT_MAX:10}
    window-seconds: ${RATE_LIMIT_WINDOW:60}
  ai:
    provider: ${AI_PROVIDER:mock}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      api-url: ${OPENAI_API_URL:https://api.openai.com/v1}
    ollama:
      model: ${OLLAMA_MODEL:llama3.2}
      api-url: ${OLLAMA_API_URL:http://localhost:11434}
    huggingface:
      api-token: ${HUGGINGFACE_API_TOKEN:}
      model: ${HUGGINGFACE_MODEL:defog/sqlcoder-7b-2}
      api-url: ${HUGGINGFACE_API_URL:https://api-inference.huggingface.co}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.0-flash}
      api-url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1}
